<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .progress-container {
            width: 100%;
            height: 30px;
            background-color: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-bar {
            height: 100%;
            background-color: #4CAF50;
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .log {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>下载功能测试</h1>

    <div>
        <label>测试URL:</label>
        <input type="text" id="testUrl" style="width: 100%; padding: 8px; margin: 10px 0;"
               value="/api/download?url=https://example.com/test.mp4&filename=test&ext=mp4">
    </div>

    <button id="downloadBtn" onclick="testDownload()">开始下载测试</button>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="log" id="log"></div>

    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function testDownload() {
            const btn = document.getElementById('downloadBtn');
            const progressBar = document.getElementById('progressBar');
            const testUrl = document.getElementById('testUrl').value;

            btn.disabled = true;
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
            document.getElementById('log').innerHTML = '';

            log('开始下载测试...');
            log('URL: ' + testUrl);

            try {
                const response = await fetch(testUrl);
                log('响应状态: ' + response.status);
                log('响应头: ' + JSON.stringify([...response.headers.entries()]));

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const contentLength = response.headers.get('content-length');
                const total = contentLength ? parseInt(contentLength, 10) : 0;
                log('Content-Length: ' + (total || '未知'));

                const reader = response.body?.getReader();
                if (!reader) {
                    throw new Error('无法读取响应流');
                }

                const chunks = [];
                let receivedLength = 0;

                while (true) {
                    const { done, value } = await reader.read();

                    if (done) break;

                    chunks.push(value);
                    receivedLength += value.length;

                    if (total > 0) {
                        const progress = Math.round((receivedLength / total) * 100);
                        progressBar.style.width = progress + '%';
                        progressBar.textContent = progress + '%';
                        log(`进度: ${progress}% (${receivedLength}/${total} bytes)`);
                    } else {
                        const estimatedProgress = Math.min(90, Math.floor(receivedLength / (1024 * 1024) * 10));
                        progressBar.style.width = estimatedProgress + '%';
                        progressBar.textContent = estimatedProgress + '%';
                        log(`已接收: ${receivedLength} bytes`);
                    }
                }

                progressBar.style.width = '100%';
                progressBar.textContent = '100%';
                log('下载完成！总大小: ' + receivedLength + ' bytes');

                // Create blob and trigger download
                const blob = new Blob(chunks);
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'test-download.mp4';
                link.click();
                URL.revokeObjectURL(url);

                log('文件下载触发成功！');

            } catch (error) {
                log('错误: ' + error.message);
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
